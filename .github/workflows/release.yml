name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    env:
      DISABLE_MARCH_NATIVE: "1"
      CCACHE_DISABLE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-aarch64-linux-gnu \
            clang \
            cmake \
            g++ \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            git \
            llvm \
            ninja-build

      - name: Build Linux x86_64
        run: ./make-native.sh

      - name: Package Linux x86_64
        run: |
          mkdir -p dist
          cp build/release/decoder dist/decoder-linux-x86_64
          chmod +x dist/decoder-linux-x86_64

      - name: Build Linux arm64
        run: ./make-cross-arm64.sh

      - name: Package Linux arm64
        run: |
          mkdir -p dist
          cp build/arm64/decoder dist/decoder-linux-arm64
          chmod +x dist/decoder-linux-arm64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: decoder-linux
          path: |
            dist/decoder-linux-x86_64
            dist/decoder-linux-arm64
          if-no-files-found: error

  build-windows-x86_64:
    name: Build Windows x86_64
    runs-on: windows-latest
    env:
      DISABLE_MARCH_NATIVE: "1"
      CCACHE_DISABLE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: git
          pacboy: >-
            clang:p
            cmake:p
            llvm:p
            ninja:p

      - name: Build
        shell: msys2 {0}
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File ./make-native.ps1

      - name: Package
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp build/release/decoder.exe dist/decoder-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: decoder-windows-x86_64
          path: dist/decoder-windows-x86_64.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows-x86_64
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* \
              --title "$TAG_NAME" \
              --generate-notes
          fi
